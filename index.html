<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, user-scalable=no"
/>

<title>Professional AR Video</title>

<!-- AFRAME -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MINDAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
touch-action:none;
}

canvas{
display:block;
image-rendering:auto;
transform:translateZ(0);
}

#loading{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
color:white;
font-size:18px;
transition:opacity .3s ease;
}

#loading.hide{
opacity:0;
pointer-events:none;
}

#tap{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
padding:12px 18px;
background:rgba(0,0,0,.72);
color:white;
border-radius:14px;
font-size:14px;
z-index:999;
backdrop-filter:blur(8px);
}

#tap.hide{
display:none;
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">Loading AR...</div>

<!-- AUDIO UNLOCK -->
<div id="tap">Tap once to enable audio</div>

<a-scene

embedded

color-space="sRGB"

vr-mode-ui="enabled:false"

device-orientation-permission-ui="enabled:false"

renderer="
antialias:true;
alpha:true;
precision:mediump;
colorManagement:true;
sortObjects:true;
physicallyCorrectLights:false;
"

mindar-image="
imageTargetSrc: targets.mind;

autoStart: true;

uiLoading: no;
uiScanning: yes;
uiError: no;

maxTrack: 1;

filterMinCF: 0.00001;
filterBeta: 0.0001;

warmupTolerance: 2;
missTolerance: 8;
"

>

<!-- ASSETS -->
<a-assets timeout="15000">

<video
id="video"

src="video.mp4"

preload="auto"

crossorigin="anonymous"

playsinline
webkit-playsinline

loop
muted
></video>

</a-assets>

<!-- CAMERA -->
<a-camera
position="0 0 0"
look-controls="enabled:false"
></a-camera>

<!-- TARGET -->
<a-entity
id="target"
mindar-image-target="targetIndex: 0"
>

<!-- VIDEO -->
<a-video
id="videoPlane"

src="#video"

position="0 0 0"

width="1"
height="1.5"

material="
shader:flat;
transparent:true;
depthTest:false;
"
></a-video>

</a-entity>

</a-scene>

<script>

const scene = document.querySelector("a-scene");

const video = document.querySelector("#video");

const target = document.querySelector("#target");

const loading = document.querySelector("#loading");

const tapUI = document.querySelector("#tap");

const videoPlane = document.querySelector("#videoPlane");

let audioUnlocked = false;

let tracking = false;

let lostTimeout = null;



// REMOVE LOADING

scene.addEventListener("renderstart", ()=>{

setTimeout(()=>{

loading.classList.add("hide");

},300);

});



// VIDEO AUTO FIT

video.addEventListener("loadedmetadata", ()=>{

const vw = video.videoWidth;

const vh = video.videoHeight;

const ratio = vw / vh;

if(ratio < 1){

videoPlane.setAttribute("width", "1");

videoPlane.setAttribute("height", 1 / ratio);

}else{

videoPlane.setAttribute("width", ratio);

videoPlane.setAttribute("height", "1");

}

});



// AUDIO UNLOCK

async function unlockAudio(){

if(audioUnlocked) return;

audioUnlocked = true;

try{

video.muted = false;

await video.play();

video.pause();

video.currentTime = 0;

}catch(e){}

tapUI.classList.add("hide");

}



// FIRST USER TAP

document.body.addEventListener(
"click",
unlockAudio,
{ once:true }
);

document.body.addEventListener(
"touchstart",
unlockAudio,
{ once:true }
);



// TARGET FOUND

target.addEventListener("targetFound", async ()=>{

clearTimeout(lostTimeout);

if(tracking) return;

tracking = true;

try{

if(audioUnlocked){

video.muted = false;

}else{

video.muted = true;

}

await video.play();

}catch(e){}

});



// TARGET LOST

target.addEventListener("targetLost", ()=>{

lostTimeout = setTimeout(()=>{

tracking = false;

video.pause();

},250);

});



// MOBILE PRELOAD FIX

window.addEventListener("load", async ()=>{

try{

video.muted = true;

await video.play();

video.pause();

video.currentTime = 0;

}catch(e){}

});



// PAGE VISIBILITY FIX

document.addEventListener("visibilitychange", ()=>{

if(document.hidden){

video.pause();

}else{

if(tracking){

video.play();

}

}

});



// IOS SAFARI FIX

video.setAttribute("playsinline", "");
video.setAttribute("webkit-playsinline", "");



// PERFORMANCE BOOST

AFRAME.registerComponent("video-visibility", {

tick: function(){

if(video.readyState >= 2){

videoPlane.object3D.visible = true;

}

}

});

videoPlane.setAttribute("video-visibility","");

</script>

</body>
</html>
