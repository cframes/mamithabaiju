<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, user-scalable=no"
/>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
width:100vw;
height:100vh;
font-family:Arial,sans-serif;
}

#loading{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
color:white;
font-size:18px;
transition:opacity .3s ease;
}

#loading.hide{
opacity:0;
pointer-events:none;
}

#tap{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.7);
padding:12px 18px;
border-radius:12px;
color:white;
font-size:14px;
z-index:999;
}

#tap.hide{
display:none;
}

canvas{
display:block;
}

</style>
</head>

<body>

<div id="loading">Loading AR...</div>

<div id="tap">Tap once to enable audio</div>

<a-scene

embedded

vr-mode-ui="enabled:false"

device-orientation-permission-ui="enabled:false"

renderer="
antialias:true;
alpha:true;
precision:mediump;
colorManagement:true;
physicallyCorrectLights:false;
"

mindar-image="
imageTargetSrc: targets.mind;

autoStart: true;

uiLoading: no;
uiScanning: yes;
uiError: no;

maxTrack: 1;

filterMinCF: 0.0001;
filterBeta: 0.001;

warmupTolerance: 0;
missTolerance: 5;
"

color-space="sRGB"
>

<a-assets timeout="15000">

<video
id="video"

src="video.mp4"

preload="auto"

crossorigin="anonymous"

playsinline
webkit-playsinline

muted

loop
></video>

</a-assets>

<a-camera
position="0 0 0"
look-controls="enabled:false"
></a-camera>

<a-entity
id="target"
mindar-image-target="targetIndex: 0"
>

<a-video
id="videoPlane"

src="#video"

position="0 0 0"

width="1"
height="1.5"

material="
shader:flat;
transparent:true;
"
></a-video>

</a-entity>

</a-scene>

<script>

const scene = document.querySelector("a-scene");

const video = document.querySelector("#video");

const target = document.querySelector("#target");

const loading = document.querySelector("#loading");

const tap = document.querySelector("#tap");

const videoPlane = document.querySelector("#videoPlane");

let audioUnlocked = false;

let isTracking = false;

let lostTimeout = null;



// LOADING REMOVE

scene.addEventListener("renderstart", ()=>{

setTimeout(()=>{

loading.classList.add("hide");

},300);

});



// AUDIO ENABLE

async function unlockAudio(){

if(audioUnlocked) return;

audioUnlocked = true;

video.muted = false;

try{

await video.play();

video.pause();

}catch(e){}

tap.classList.add("hide");

}

document.body.addEventListener("click", unlockAudio,{once:true});

document.body.addEventListener("touchstart", unlockAudio,{once:true});



// VIDEO FIT INSIDE FRAME

video.addEventListener("loadedmetadata", ()=>{

const vw = video.videoWidth;

const vh = video.videoHeight;

const ratio = vw / vh;

if(ratio < 1){

videoPlane.setAttribute("width", "1");

videoPlane.setAttribute("height", 1 / ratio);

}else{

videoPlane.setAttribute("width", ratio);

videoPlane.setAttribute("height", "1");

}

});



// TARGET FOUND

target.addEventListener("targetFound", async ()=>{

clearTimeout(lostTimeout);

if(isTracking) return;

isTracking = true;

try{

if(audioUnlocked){

video.muted = false;

}else{

video.muted = true;

}

await video.play();

}catch(e){}

});



// TARGET LOST

target.addEventListener("targetLost", ()=>{

lostTimeout = setTimeout(()=>{

isTracking = false;

video.pause();

},200);

});



// PRELOAD VIDEO

window.addEventListener("load", async ()=>{

try{

video.muted = true;

await video.play();

video.pause();

video.currentTime = 0;

}catch(e){}

});



// MOBILE PERFORMANCE BOOST

AFRAME.registerComponent('video-optimizer', {

tick: function () {

if(video.readyState >= 2){

videoPlane.object3D.visible = true;

}

}

});

videoPlane.setAttribute('video-optimizer','');

</script>

</body>
</html>
