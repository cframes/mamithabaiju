<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
/>

<title>Professional Stable AR</title>

<!-- AFRAME -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MINDAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
touch-action:none;
-webkit-user-select:none;
user-select:none;
}

body{
position:fixed;
inset:0;
}

canvas{
display:block;
image-rendering:auto;
}

#loading{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
color:#fff;
font-size:18px;
letter-spacing:.5px;
transition:opacity .3s ease;
}

#loading.hide{
opacity:0;
pointer-events:none;
}

#tap{
position:fixed;
left:50%;
bottom:25px;
transform:translateX(-50%);
padding:12px 18px;
background:rgba(0,0,0,.72);
color:#fff;
font-size:14px;
border-radius:14px;
z-index:999;
backdrop-filter:blur(10px);
}

#tap.hide{
display:none;
}

</style>
</head>

<body>

<div id="loading">Loading AR...</div>

<div id="tap">Tap once to enable audio</div>

<a-scene

embedded

vr-mode-ui="enabled:false"

device-orientation-permission-ui="enabled:false"

color-space="sRGB"

renderer="
alpha:true;
antialias:true;
precision:mediump;
colorManagement:true;
sortObjects:true;
physicallyCorrectLights:false;
logarithmicDepthBuffer:true;
powerPreference:high-performance;
"

mindar-image="
imageTargetSrc: targets.mind;

autoStart: true;

uiLoading: no;
uiScanning: yes;
uiError: no;

maxTrack: 1;

filterMinCF: 0.001;
filterBeta: 0.01;

warmupTolerance: 5;
missTolerance: 3;
"

>

<a-assets timeout="20000">

<video
id="video"

src="video.mp4"

preload="auto"

crossorigin="anonymous"

loop

playsinline
webkit-playsinline

muted

></video>

</a-assets>

<a-camera
position="0 0 0"
look-controls="enabled:false"
></a-camera>

<a-entity
id="target"
mindar-image-target="targetIndex:0"
>

<a-video
id="videoPlane"

src="#video"

position="0 0 0"

width="1"
height="1.5"

material="
shader:flat;
transparent:true;
depthTest:false;
depthWrite:false;
toneMapped:false;
"
></a-video>

</a-entity>

</a-scene>

<script>

const scene = document.querySelector("a-scene");

const video = document.querySelector("#video");

const target = document.querySelector("#target");

const videoPlane = document.querySelector("#videoPlane");

const loading = document.querySelector("#loading");

const tapUI = document.querySelector("#tap");

let tracking = false;

let audioUnlocked = false;

let lostTimeout = null;



// LOADING REMOVE

scene.addEventListener("renderstart", ()=>{

setTimeout(()=>{

loading.classList.add("hide");

},300);

});



// VIDEO FIT

video.addEventListener("loadedmetadata", ()=>{

const vw = video.videoWidth;

const vh = video.videoHeight;

const ratio = vw / vh;

if(ratio > 1){

videoPlane.setAttribute("width", ratio);

videoPlane.setAttribute("height", 1);

}else{

videoPlane.setAttribute("width", 1);

videoPlane.setAttribute("height", 1 / ratio);

}

});



// PRELOAD VIDEO

async function preloadVideo(){

try{

video.muted = true;

await video.play();

video.pause();

video.currentTime = 0;

}catch(e){}

}

window.addEventListener("load", preloadVideo);



// AUDIO UNLOCK

async function unlockAudio(){

if(audioUnlocked) return;

audioUnlocked = true;

try{

video.muted = false;

await video.play();

video.pause();

video.currentTime = 0;

}catch(e){}

tapUI.classList.add("hide");

}

document.body.addEventListener(
"click",
unlockAudio,
{ once:true }
);

document.body.addEventListener(
"touchstart",
unlockAudio,
{ once:true }
);



// TARGET FOUND

target.addEventListener("targetFound", async ()=>{

clearTimeout(lostTimeout);

if(tracking) return;

tracking = true;

try{

if(audioUnlocked){

video.muted = false;

}else{

video.muted = true;

}

video.currentTime = 0;

await video.play();

}catch(e){}

});



// TARGET LOST

target.addEventListener("targetLost", ()=>{

lostTimeout = setTimeout(()=>{

tracking = false;

video.pause();

},120);

});



// PAGE VISIBILITY

document.addEventListener("visibilitychange", ()=>{

if(document.hidden){

video.pause();

}else{

if(tracking){

video.play();

}

}

});



// IOS FIX

video.setAttribute("playsinline", "");

video.setAttribute("webkit-playsinline", "");



// FORCE VIDEO TEXTURE UPDATE

AFRAME.registerComponent("video-updater", {

tick: function(){

if(video.readyState >= 2){

const mesh = this.el.getObject3D("mesh");

if(mesh){

mesh.material.map.needsUpdate = true;

}

}

}

});

videoPlane.setAttribute("video-updater","");



// PERFORMANCE OPTIMIZATION

AFRAME.registerComponent("visibility-handler", {

tick:function(){

this.el.object3D.visible = tracking;

}

});

videoPlane.setAttribute("visibility-handler","");

</script>

</body>
</html>
